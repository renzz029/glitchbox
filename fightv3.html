<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>1v1 FIX - GLITCHBOX</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00f3ff; font-family: monospace; overflow: hidden; }
        #gui { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #bc13fe; }
        #menu { position: absolute; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        input { padding: 10px; background: #111; color: #fff; border: 1px solid #00f3ff; margin: 10px; }
        button { padding: 10px 20px; background: #bc13fe; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="gui">El teu ID: <b id="my-id">Carregant...</b></div>

<div id="menu" id="setup-menu">
    <h1>1v1 ONLINE FIX</h1>
    <p>Dona el teu ID a l'amic o posa el seu:</p>
    <input type="text" id="remote-id" placeholder="ID de l'amic">
    <button id="btn-connect">CONNECTAR I JUGAR</button>
    <p id="status">Esperant sistema...</p>
</div>

<script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    // --- LÒGICA DE XARXA ---
    const peer = new Peer();
    let conn;
    const enemyObj = new THREE.Mesh(
        new THREE.BoxGeometry(1, 2, 1),
        new THREE.MeshBasicMaterial({ color: 0xff0000 })
    );

    peer.on('open', id => {
        document.getElementById('my-id').innerText = id;
        document.getElementById('status').innerText = "Llest.";
    });

    // Quan algú et connecta a tu
    peer.on('connection', c => {
        conn = c;
        setupEvents();
        document.getElementById('menu').style.display = 'none';
    });

    // Quan tu connectes a algú
    document.getElementById('btn-connect').onclick = () => {
        const rId = document.getElementById('remote-id').value;
        conn = peer.connect(rId);
        conn.on('open', () => {
            setupEvents();
            document.getElementById('menu').style.display = 'none';
        });
    };

    function setupEvents() {
        conn.on('data', data => {
            if(data.type === 'move') {
                enemyObj.position.set(data.x, data.y, data.z);
            }
        });
    }

    // --- LÒGICA 3D ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.GridHelper(50, 50, 0x00f3ff, 0x222222));
    scene.add(enemyObj);
    camera.position.set(0, 2, 5);

    const keys = {};
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function animate() {
        requestAnimationFrame(animate);
        
        // Moviment bàsic
        if(keys['KeyW']) camera.position.z -= 0.1;
        if(keys['KeyS']) camera.position.z += 0.1;
        if(keys['KeyA']) camera.position.x -= 0.1;
        if(keys['KeyD']) camera.position.x += 0.1;

        // Enviar posició
        if(conn && conn.open) {
            conn.send({
                type: 'move',
                x: camera.position.x,
                y: camera.position.y - 1,
                z: camera.position.z
            });
        }

        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>

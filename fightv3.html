<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>1v1 WORKING</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00f3ff; font-family: sans-serif; text-align: center; }
        #setup { position: absolute; width: 100%; top: 20%; z-index: 100; background: rgba(0,0,0,0.9); padding: 20px; }
        .id-box { font-size: 30px; color: #fff; background: #333; padding: 10px; margin: 20px; border: 2px solid #bc13fe; display: inline-block; }
        input { padding: 10px; font-size: 18px; }
        button { padding: 10px 20px; font-size: 18px; background: #bc13fe; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>PASSA AQUEST CODI AL TEU AMIC:</h1>
        <div id="display-id" class="id-box">CARREGANT...</div>
        
        <br><br>
        <hr>
        <br>
        
        <h1>O POSA EL CODI DEL TEU AMIC:</h1>
        <input type="text" id="friend-id" placeholder="Codi de l'amic...">
        <button id="connect-btn">JUGAR ARA</button>
        <p id="status">Estat: Esperant PeerJS...</p>
    </div>

    <script>
        // 1. CONFIG XARXA[cite: 2]
        const peer = new Peer();
        let conn;

        peer.on('open', (id) => {
            document.getElementById('display-id').innerText = id;
            document.getElementById('status').innerText = "Estat: Online. Comparteix el codi.";
        });

        peer.on('connection', (c) => {
            conn = c;
            ready();
        });

        document.getElementById('connect-btn').onclick = () => {
            const fId = document.getElementById('friend-id').value;
            conn = peer.connect(fId);
            conn.on('open', () => ready());
        };

        function ready() {
            document.getElementById('setup').style.display = 'none';
            initGame();
        }

        // 2. JOC 3D SIMPLIFICAT[cite: 5]
        function initGame() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const grid = new THREE.GridHelper(100, 20, 0xbc13fe, 0x444444);
            scene.add(grid);

            const rival = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), new THREE.MeshBasicMaterial({color: 0xff0000}));
            scene.add(rival);
            camera.position.set(0, 2, 10);

            const move = { w:false, a:false, s:false, d:false };
            window.onkeydown = (e) => { move[e.key.toLowerCase()] = true; };
            window.onkeyup = (e) => { move[e.key.toLowerCase()] = false; };

            conn.on('data', (data) => {
                rival.position.set(data.x, data.y, data.z);
            });

            function animate() {
                requestAnimationFrame(animate);
                if (move.w) camera.position.z -= 0.1;
                if (move.s) camera.position.z += 0.1;
                if (move.a) camera.position.x -= 0.1;
                if (move.d) camera.position.x += 0.1;

                conn.send({ x: camera.position.x, y: camera.position.y - 1, z: camera.position.z });
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>

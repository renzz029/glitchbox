<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        .led-box {
            border: 2px solid #bc13fe;
            background: #000;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 0 15px #bc13fe;
            text-align: center;
            min-width: 140px;
        }
        .label {
            font-size: 10px;
            color: #bc13fe;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .number {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe;
        }
    </style>
</head>
<body>
    <div class="led-box">
        <div class="label">System Views</div>
        <div id="count" class="number">--</div>
    </div>

    <script>
        // Aquest script busca el número pur (text), no una imatge
        async function updateCounter() {
            try {
                const response = await fetch('https://api.countapi.xyz/hit/renzz029-glitchbox/visits');
                const data = await response.json();
                document.getElementById('count').innerText = data.value;
            } catch (err) {
                document.getElementById('count').innerText = "08"; // Número de seguretat
            }
        }
        updateCounter();
    </script>
</body>
</html>

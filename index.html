<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>renz029_GlitchBox</title>
    <style>
        :root {
            --led-purple: #bc13fe;
            --led-cyan: #00f3ff;
            --bg-obsidian: #020205;
        }

        body {
            background-color: var(--bg-obsidian);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Capçalera */
        .header { text-align: center; margin-bottom: 50px; }
        h1 { 
            font-size: 3.5rem; 
            font-weight: 900; 
            letter-spacing: 8px; 
            margin: 0; 
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--led-purple);
        }
        .cyan-text { color: var(--led-cyan); text-shadow: 0 0 15px var(--led-cyan); }
        .subtitle {
            font-family: monospace;
            color: #555;
            letter-spacing: 5px;
            font-size: 14px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Grelha de Jocs */
        .grid { display: flex; gap: 30px; margin-bottom: 40px; }
        
        .box {
            width: 320px;
            height: 220px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .box-active {
            border: 2px solid var(--led-purple);
            background: rgba(188, 19, 254, 0.05);
            box-shadow: inset 0 0 15px rgba(188, 19, 254, 0.2);
        }

        .box-locked {
            border: 2px dashed #222;
            opacity: 0.4;
        }

        .box h2 { 
            color: white; 
            margin: 15px 0 5px 0; 
            letter-spacing: 3px; 
            font-size: 22px;
            text-transform: uppercase;
        }

        .status-dot { font-size: 10px; color: var(--led-cyan); font-weight: bold; margin-bottom: 10px; }
        .init-session { font-family: monospace; color: #444; font-size: 11px; }

        /* Footer Info */
        .user-info {
            font-family: monospace;
            color: #444;
            font-size: 11px;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        /* Caixa de Views (Disseny idèntic al Captura de pantalla 2026-05-05 101003.png) */
        .views-container {
            border: 2px solid var(--led-purple);
            padding: 10px 40px;
            border-radius: 10px;
            background: black;
            box-shadow: 0 0 15px var(--led-purple);
            text-align: center;
        }

        .views-label {
            color: var(--led-purple);
            font-family: monospace;
            font-size: 10px;
            letter-spacing: 3px;
            margin-bottom: 5px;
            display: block;
        }

        .views-number {
            color: white;
            font-size: 20px;
            font-weight: bold;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>RENZ029_<span class="cyan-text">GLITCHBOX</span></h1>
        <div class="subtitle">SYSTEM INTERFACE // READY_TO_PLAY</div>
    </div>

    <div class="grid">
        <!-- Snake Box -->
        <a href="snakev3.html" class="box box-active">
            <img src="https://img.icons8.com/color/96/snake.png" alt="snake" width="60">
            <h2>SNAKE LED</h2>
            <div class="status-dot">● SYSTEM ONLINE</div>
            <div class="init-session">[ INITIALIZE SESSION ]</div>
        </a>

        <!-- Locked Box -->
        <div class="box box-locked">
            <img src="https://img.icons8.com/ios-filled/100/444444/lock.png" alt="lock" width="50">
            <h2 style="color: #444;">VOID_DATA</h2>
            <div class="status-dot" style="color: #333;">● LOCKED</div>
        </div>
    </div>

    <div class="user-info">USER: RENZ029 | STATUS: STABLE</div>

    <div class="views-container">
        <span class="views-label">SYSTEM VIEWS</span>
        <div id="count" class="views-number">029</div>
    </div>

    <script>
        // Funció per carregar les visites reals sense imatges (perquè no es trenqui)
        async function loadViews() {
            try {
                const response = await fetch('https://api.counterapi.dev/v1/renzz029/glitchbox/up');
                const data = await response.json();
                if(data.count) {
                    document.getElementById('count').innerText = data.count;
                }
            } catch (e) {
                // Si el wifi de l'insti bloqueja la connexió, es queda el número 029 per defecte
            }
        }
        loadViews();
    </script>

</body>
</html>

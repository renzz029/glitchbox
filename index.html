<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>renz029_GlitchBox | Gaming Hub</title>
    <style>
        :root {
            --led-purple: #bc13fe;
            --led-cyan: #00f3ff;
            --bg-obsidian: #020205;
        }

        body {
            background-color: var(--bg-obsidian);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* Línies d'escaneig tipus monitor antic */
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), var(--bg-obsidian);
            background-size: 100% 4px;
        }

        .header { text-align: center; margin-bottom: 60px; }
        
        h1 { 
            font-size: 3.5rem; 
            font-weight: 900; 
            letter-spacing: 10px; 
            margin: 0; 
            text-transform: uppercase; 
            text-shadow: 0 0 15px var(--led-purple); 
        }

        .glitch-part { color: var(--led-cyan); text-shadow: 0 0 15px var(--led-cyan); }
        
        .subtitle { 
            font-family: 'Courier New', monospace; 
            color: rgba(255, 255, 255, 0.4); 
            letter-spacing: 4px; 
            font-size: 13px; 
            margin-top: 15px; 
            text-transform: uppercase; 
        }

        .game-grid { display: flex; gap: 40px; margin-bottom: 50px; }

        .card {
            text-decoration: none; 
            width: 300px; 
            height: 200px;
            background: rgba(188, 19, 254, 0.05); 
            border: 2px solid var(--led-purple);
            border-radius: 8px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover { 
            transform: translateY(-8px); 
            border-color: var(--led-cyan); 
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.3); 
        }

        .card h2 { color: white; font-size: 24px; margin: 10px 0 0 0; letter-spacing: 2px; }

        /* --- CONTADOR HITS (GRATIS I INFINIT) --- */
        .footer { text-align: center; margin-top: 20px; }
        
        .system-info { 
            font-family: 'Courier New', monospace; 
            font-size: 10px; 
            color: rgba(255, 255, 255, 0.3); 
            letter-spacing: 2px; 
            margin-bottom: 15px; 
        }

        .led-frame {
            border: 2px solid var(--led-purple);
            padding: 15px;
            border-radius: 10px;
            background: black;
            box-shadow: 0 0 20px var(--led-purple);
            display: inline-block;
        }

        .led-frame img {
            display: block;
            /* Filtre per fer que brilli més */
            filter: drop-shadow(0 0 5px var(--led-purple));
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>RENZ029_<span class="glitch-part">GLITCHBOX</span></h1>
        <div class="subtitle">SYSTEM INTERFACE // READY_TO_PLAY</div>
    </div>

    <div class="game-grid">
        <a href="snakev3.html" class="card">
            <span style="font-size: 50px;">🐍</span>
            <h2>SNAKE LED</h2>
            <div style="font-size: 10px; color: var(--led-cyan); margin-top: 10px; font-weight: bold;">● SYSTEM ONLINE</div>
        </a>

        <div class="card" style="opacity: 0.2; cursor: not-allowed; border-style: dashed;">
            <span style="font-size: 50px;">🔒</span>
            <h2>VOID_DATA</h2>
        </div>
    </div>

    <div class="footer">
        <div class="system-info">USER: RENZ029 | STATUS: STABLE</div>
        
        <div class="led-frame">
            <!-- Aquest és el link màgic de HITS. S'actualitza sol cada cop que algú entra -->
            <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Frenzz029.github.io%2Fglitchbox&count_bg=%23BC13FE&title_bg=%23303030&icon=&icon_color=%23E7E7E7&title=SYSTEM_VIEWS&edge_flat=false" alt="Views"/>
        </div>
    </div>

</body>
</html>

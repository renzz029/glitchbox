<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>renz029_GlitchBox | Gaming Hub</title>
    <style>
        :root {
            --led-purple: #bc13fe;
            --led-cyan: #00f3ff;
            --bg-obsidian: #020205;
        }

        body {
            background-color: var(--bg-obsidian);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), var(--bg-obsidian);
            background-size: 100% 4px;
        }

        .header { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: 10px; margin: 0; text-transform: uppercase; text-shadow: 0 0 15px var(--led-purple); }
        .glitch-part { color: var(--led-cyan); text-shadow: 0 0 15px var(--led-cyan); }
        
        .game-grid { display: flex; gap: 40px; margin-bottom: 50px; }
        .card {
            text-decoration: none; width: 300px; height: 200px;
            background: rgba(188, 19, 254, 0.05); border: 2px solid var(--led-purple);
            border-radius: 8px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.3s ease;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--led-cyan); box-shadow: 0 0 30px rgba(188, 19, 254, 0.3); }

        .footer { text-align: center; }
        .system-info { font-family: 'Courier New', monospace; font-size: 10px; color: rgba(255, 255, 255, 0.3); letter-spacing: 2px; margin-bottom: 10px; }
        
        .led-box {
            border: 2px solid var(--led-purple);
            background: #000;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 0 20px var(--led-purple);
            display: inline-block;
        }

        .led-label { font-family: 'Courier New', monospace; font-size: 10px; color: var(--led-purple); letter-spacing: 2px; margin-bottom: 5px; }
        .led-number { font-family: 'Courier New', monospace; font-size: 24px; font-weight: bold; color: #fff; text-shadow: 0 0 10px var(--led-purple); }
    </style>
</head>
<body>

    <div class="header">
        <h1>RENZ029_<span class="glitch-part">GLITCHBOX</span></h1>
    </div>

    <div class="game-grid">
        <a href="snakev3.html" class="card">
            <span style="font-size: 50px;">🐍</span>
            <h2>SNAKE LED</h2>
        </a>
    </div>

    <div class="footer">
        <div class="system-info">SYSTEM STATUS: ANALYZING TRAFFIC...</div>
        <div class="led-box">
            <div class="led-label">GLOBAL_SESSIONS</div>
            <div id="stats" class="led-number">LIVE_TRACKING</div>
        </div>
    </div>

    <!-- AQUEST SCRIPT COMPTA TOTS ELS USUARIS REALS SENSE IMATGES -->
    <script data-goatcounter="https://renz029.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>

</body>
</html>

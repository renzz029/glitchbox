<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>renz029_GlitchBox | Gaming Hub</title>
    <style>
        :root {
            --led-purple: #bc13fe;
            --led-cyan: #00f3ff;
            --bg-obsidian: #020205;
        }

        body {
            background-color: var(--bg-obsidian);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            cursor: default;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), var(--bg-obsidian);
            background-size: 100% 4px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 10px;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--led-purple);
        }

        .glitch-part {
            color: var(--led-cyan);
            text-shadow: 0 0 15px var(--led-cyan);
        }

        .subtitle {
            font-family: 'Courier New', monospace;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 4px;
            font-size: 13px;
            margin-top: 15px;
        }

        .game-grid {
            display: flex;
            gap: 40px;
        }

        .card {
            text-decoration: none;
            width: 300px;
            height: 200px;
            background: rgba(188, 19, 254, 0.05);
            border: 2px solid var(--led-purple);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--led-cyan);
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.3);
            background: rgba(188, 19, 254, 0.1);
        }

        .card h2 {
            color: white;
            font-size: 24px;
            margin: 10px 0 0 0;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .card .status {
            font-size: 10px;
            color: var(--led-cyan);
            text-transform: uppercase;
            margin-top: 10px;
            font-weight: bold;
        }

        .emoji { font-size: 50px; }

        /* --- ESTIL DEL COMPTADOR LED --- */
        .footer {
            position: fixed;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .system-info {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .led-counter-container {
            border: 2px solid var(--led-purple);
            background: #111;
            padding: 5px 15px;
            border-radius: 5px;
            box-shadow: 0 0 15px var(--led-purple);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 120px;
        }

        .led-label {
            font-family: 'Courier New', monospace;
            font-size: 9px;
            color: var(--led-purple);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2px;
        }

        .led-counter-container img {
            filter: drop-shadow(0 0 5px var(--led-purple));
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>RENZ029_<span class="glitch-part">GLITCHBOX</span></h1>
        <div class="subtitle">SYSTEM INTERFACE // READY_TO_PLAY</div>
    </div>

    <div class="game-grid">
        <a href="snakev3.html" class="card">
            <span class="emoji">🐍</span>
            <h2>SNAKE LED</h2>
            <div class="status">● System Online</div>
            <p style="font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 10px;">[ INITIALIZE SESSION ]</p>
        </a>

        <div class="card" style="opacity: 0.2; cursor: not-allowed; border-style: dashed;">
            <span class="emoji">🔒</span>
            <h2>VOID_DATA</h2>
            <div class="status">● Locked</div>
        </div>
    </div>

    <div class="footer">
        <div class="system-info">USER: RENZ029 | STATUS: STABLE</div>
        
        <!-- COMPTADOR DISSENYAT COM A PANTALLA LED -->
        <div class="led-counter-container">
            <div class="led-label">System Views</div>
            <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Frenzz029.github.io%2Fglitchbox&count_bg=%2300000000&title_bg=%2300000000&icon=&icon_color=%23E7E7E7&title=%20&edge_flat=true" alt="Views">
        </div>
    </div>

</body>
</html>

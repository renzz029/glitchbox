<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>renz029_GlitchBox</title>
    <style>
        :root {
            --led-purple: #bc13fe;
            --led-cyan: #00f3ff;
            --led-red: #ff003c;
            --bg-obsidian: #020205;
        }

        body {
            background-color: var(--bg-obsidian);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Capçalera */
        .header { text-align: center; margin-bottom: 50px; }
        h1 { 
            font-size: 3.5rem; 
            font-weight: 900; 
            letter-spacing: 8px; 
            margin: 0; 
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--led-purple);
        }
        .cyan-text { color: var(--led-cyan); text-shadow: 0 0 15px var(--led-cyan); }
        .subtitle {
            font-family: monospace;
            color: #555;
            letter-spacing: 5px;
            font-size: 14px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Grelha de Jocs */
        .grid { display: flex; gap: 30px; margin-bottom: 40px; }
        
        .box {
            width: 320px;
            height: 220px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .box:hover {
            transform: translateY(-5px);
        }

        .box-active {
            border: 2px solid var(--led-purple);
            background: rgba(188, 19, 254, 0.05);
            box-shadow: inset 0 0 15px rgba(188, 19, 254, 0.2);
        }

        .box-fight {
            border: 2px solid var(--led-red);
            background: rgba(255, 0, 60, 0.05);
            box-shadow: inset 0 0 15px rgba(255, 0, 60, 0.2);
        }

        .box-fight:hover {
            box-shadow: 0 0 20px var(--led-red);
        }

        .box h2 { 
            color: white; 
            margin: 10px 0 5px 0; 
            letter-spacing: 3px; 
            font-size: 22px;
            text-transform: uppercase;
        }

        .emoji {
            font-size: 60px; /* Mida igual per als dos jocs */
            margin-bottom: 5px;
        }

        .status-dot { font-size: 10px; color: var(--led-cyan); font-weight: bold; margin-bottom: 10px; }
        .status-red { color: var(--led-red); }
        .init-session { font-family: monospace; color: #444; font-size: 11px; }

        /* Footer Info */
        .user-info {
            font-family: monospace;
            color: #444;
            font-size: 11px;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        /* Caixa de Views */
        .views-container {
            border: 2px solid var(--led-purple);
            padding: 10px 40px;
            border-radius: 10px;
            background: black;
            box-shadow: 0 0 15px var(--led-purple);
            text-align: center;
        }

        .views-label {
            color: var(--led-purple);
            font-family: monospace;
            font-size: 10px;
            letter-spacing: 3px;
            margin-bottom: 5px;
            display: block;
        }

        .views-number {
            color: white;
            font-size: 20px;
            font-weight: bold;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>RENZ029_<span class="cyan-text">GLITCHBOX</span></h1>
        <div class="subtitle">SYSTEM INTERFACE // READY_TO_PLAY</div>
    </div>

    <div class="grid">
        <!-- Snake Box -->
        <a href="snakev3.html" class="box box-active">
            <span class="emoji">🐍</span>
            <h2>SNAKE LED</h2>
            <div class="status-dot">● SYSTEM ONLINE</div>
            <div class="init-session">[ INITIALIZE SESSION ]</div>
        </a>

        <!-- Fight Box -->
        <a href="fightv3.html" class="box box-fight">
            <span class="emoji">🔫</span>
            <h2>1v1 FIGHT</h2>
            <div class="status-dot status-red">● ARENA READY</div>
            <div class="init-session">[ JOIN COMBAT ]</div>
        </a>
    </div>

    <div class="user-info">USER: RENZ029 | STATUS: STABLE</div>

    <div class="views-container">
        <span class="views-label">SYSTEM VIEWS</span>
        <div id="count" class="views-number">084</div>
    </div>

    <script>
        async function loadViews() {
            try {
                const response = await fetch('https://api.counterapi.dev/v1/renzz029/glitchbox/up');
                const data = await response.json();
                if(data.count) {
                    document.getElementById('count').innerText = data.count.toString().padStart(3, '0');
                }
            } catch (e) {
                // Es queda el valor de la captura si falla la connexió
            }
        }
        loadViews();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>renz029_GlitchBox | Gaming Hub</title>
    <style>
        :root {
            --led-purple: #bc13fe;
            --led-cyan: #00f3ff;
            --bg-obsidian: #020205;
        }

        body {
            background-color: var(--bg-obsidian);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), var(--bg-obsidian);
            background-size: 100% 4px;
        }

        .header { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: 10px; margin: 0; text-transform: uppercase; text-shadow: 0 0 15px var(--led-purple); }
        .glitch-part { color: var(--led-cyan); text-shadow: 0 0 15px var(--led-cyan); }

        .game-grid { display: flex; gap: 40px; }
        .card {
            text-decoration: none; width: 300px; height: 200px;
            background: rgba(188, 19, 254, 0.05); border: 2px solid var(--led-purple);
            border-radius: 8px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.3s;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--led-cyan); box-shadow: 0 0 30px rgba(188, 19, 254, 0.3); }

        /* --- COMPTADOR LED SENSE IMATGE --- */
        .footer {
            margin-top: 50px;
            text-align: center;
        }

        .led-box {
            border: 2px solid var(--led-purple);
            background: #000;
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px var(--led-purple);
            display: inline-block;
        }

        .led-label {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--led-purple);
            letter-spacing: 3px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .led-number {
            font-family: 'Courier New', Courier, monospace;
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px var(--led-purple), 0 0 20px var(--led-purple);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .led-number span {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            text-shadow: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>RENZ029_<span class="glitch-part">GLITCHBOX</span></h1>
    </div>

    <div class="game-grid">
        <a href="snakev3.html" class="card">
            <span style="font-size: 50px;">🐍</span>
            <h2 style="color: white; letter-spacing: 2px;">SNAKE LED</h2>
            <div style="font-size: 10px; color: var(--led-cyan); margin-top: 50px;">● SYSTEM ONLINE</div>
        </a>

        <div class="card" style="opacity: 0.2; cursor: not-allowed; border-style: dashed;">
            <span style="font-size: 50px;">🔒</span>
            <h2 style="color: white;">VOID_DATA</h2>
        </div>
    </div>

    <div class="footer">
        <div class="led-box">
            <div class="led-label">System Status</div>
            <div class="led-number" id="count-display">
                00 <span>VIEWS</span>
            </div>
        </div>
    </div>

    <script>
        // Aquest script crida a un comptador real i posa el número al teu disseny
        function getViews() {
            // Utilitzem un servei anomenat CountAPI que és gratuït i ràpid
            fetch('https://api.countapi.xyz/hit/renzz029-glitchbox/visits')
                .then(res => res.json())
                .then(res => {
                    document.getElementById('count-display').innerHTML = res.value + " <span>VIEWS</span>";
                })
                .catch(err => {
                    // Si el servei falla, almenys que surti un número fake per l'estètica
                    document.getElementById('count-display').innerHTML = "05 <span>VIEWS</span>";
                });
        }
        getViews();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>renz029_GlitchBox | Gaming Hub</title>
    <style>
        :root {
            --led-purple: #bc13fe;
            --led-cyan: #00f3ff;
            --bg-obsidian: #020205;
        }

        body {
            background-color: var(--bg-obsidian);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), var(--bg-obsidian);
            background-size: 100% 4px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 10px;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--led-purple);
        }

        .glitch-part {
            color: var(--led-cyan);
            text-shadow: 0 0 15px var(--led-cyan);
        }

        .subtitle {
            font-family: 'Courier New', monospace;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 4px;
            font-size: 13px;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .game-grid {
            display: flex;
            gap: 40px;
            margin-bottom: 50px;
        }

        .card {
            text-decoration: none;
            width: 300px;
            height: 200px;
            background: rgba(188, 19, 254, 0.05);
            border: 2px solid var(--led-purple);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--led-cyan);
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.3);
        }

        .card h2 {
            color: white;
            font-size: 24px;
            margin: 10px 0 0 0;
            letter-spacing: 2px;
        }

        .status {
            font-size: 10px;
            color: var(--led-cyan);
            text-transform: uppercase;
            margin-top: 10px;
            font-weight: bold;
        }

        .init-text {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            margin-top: 15px;
        }

        /* --- CONTADOR LED ACTUALITZABLE --- */
        .footer {
            text-align: center;
        }

        .system-info {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .led-box {
            border: 2px solid var(--led-purple);
            background: #000;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 0 20px var(--led-purple);
            display: inline-block;
        }

        .led-label {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: var(--led-purple);
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        /* Estil per a la imatge del comptador */
        .counter-img {
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 0 5px var(--led-purple));
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>RENZ029_<span class="glitch-part">GLITCHBOX</span></h1>
        <div class="subtitle">SYSTEM INTERFACE // READY_TO_PLAY</div>
    </div>

    <div class="game-grid">
        <a href="snakev3.html" class="card">
            <span style="font-size: 50px;">🐍</span>
            <h2>SNAKE LED</h2>
            <div class="status">● SYSTEM ONLINE</div>
            <div class="init-text">[ INITIALIZE SESSION ]</div>
        </a>

        <div class="card" style="opacity: 0.2; cursor: not-allowed; border-style: dashed;">
            <span style="font-size: 50px;">🔒</span>
            <h2>VOID_DATA</h2>
            <div class="status" style="color: gray;">● LOCKED</div>
        </div>
    </div>

    <div class="footer">
        <div class="system-info">USER: RENZ029 | STATUS: STABLE</div>
        
        <div class="led-box">
            <div class="led-label">System Views</div>
            <!-- Aquesta imatge s'actualitza sola cada vegada que algú entra -->
            <img class="counter-img" src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Frenzz029.github.io%2Fglitchbox&count_bg=%2300000000&title_bg=%2300000000&icon=&icon_color=%23E7E7E7&title=VIEWS&edge_flat=false" alt="Views Counter">
        </div>
    </div>

</body>
</html>
